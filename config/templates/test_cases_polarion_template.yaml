polarion_template:
  xml_example: "config/examples/{COMPONENT}-examples/{COMPONENT}-polarion-test-case-example-simplified.xml"
  
  structure:
    id: "{JIRA_KEY}"
    title: "{TEST_CASE_TITLE}"
    description: "{TEST_CASE_DESCRIPTION}"
    priority: "Medium"
    status: "draft"
    type: "testcase"
    
    casecomponent: "{COMPONENT}"
    caseimportance: "Critical"
    caselevel: "Component"
    caseautomation: "Not Automated"
    caseposneg: "Positive"
    testtype: "Functional"
    subteam: "Cluster Operator"
    products: ["OCP"]
    version: ["4.20"]
    trello: "{JIRA_KEY}"

  outputs:
    polarion_xml:
      format: "xml"
      file: "{JIRA_KEY}_polarion.xml"
    markdown:
      format: "markdown"
      file: "{JIRA_KEY}_test_case.md"
