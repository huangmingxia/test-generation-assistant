# Test Case Generation Workflow Configuration
# Dedicated workflow engine for generating test cases only

workflow:
  name: "test_case_generation"
  version: "3.1"
  description: "Optimized parallel workflow for test case generation (Phases 1-4)"
  target_execution_time: "270 seconds"  # 4.5 minutes total for all 4 phases
  total_timeout: 270  # Hard 4.5-minute limit

# Workflow Phases for Test Case Generation
phases:
  phase_1:
    name: "requirements_gathering"
    agent: "requirements_gathering"
    description: "Lightning-fast requirements gathering from JIRA (30s target)"
    execution_order: 1
    dependencies: []
    timeout: 35  # 35 seconds hard limit
    critical_path: true
    optimization_level: "maximum_speed"
    fast_fail_enabled: true
    cache_enabled: false  # Skip caching for speed
    
    execution_logic:
      steps:
        - step: "fast_execute"
          action: "execute_agent_direct"
          tools: ["jira-mcp-snowflake"]
          output_format: "yaml"
          skip_validation: true
          fast_mode: true
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"

  phase_2:
    name: "test_strategy_analysis"
    agent: "test_strategy_analysis"
    description: "Lightning-fast rule-based strategy decision (10s target)"
    execution_order: 2
    dependencies: ["phase_1"]
    timeout: 15  # 15 seconds - simple rule matching only
    critical_path: true
    optimization_level: "maximum_speed"
    
    execution_logic:
      steps:
        - step: "fast_rule_match"
          action: "execute_agent_direct"
          input: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
          tools: ["rule_matcher"]
          output_format: "yaml"
          skip_validation: true
          rule_only: true
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"

  phase_3:
    name: "test_case_generation"
    agent: "test_case_generation"
    description: "Comprehensive test case generation using checkpoint analysis and optimization"
    execution_order: 3
    dependencies: ["phase_2"]
    timeout: 150  # 2.5 minutes for checkpoint analysis and test case generation
    parallel_execution: false
    optimization_level: "high_speed"
    fast_fail_enabled: true
    target_execution_time: 60  # Target: 60 seconds
    
    execution_logic:
      steps:
        - step: "wait_for_dependencies"
          action: "wait_for_phase"
          wait_for: "phase_2"
          timeout: 10
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/test_case_generation.yaml"
        - step: "load_inputs"
          action: "load_phase_outputs"
          inputs:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
        - step: "execute_agent"
          action: "execute_agent"
          tools: ["DeepWiki MCP", "Checkpoint Aggregator", "Test Scenario Generator", "Template Processor", "Markdown Generator"]
          output_format: "mixed"
        - step: "save_outputs"
          action: "save_multiple_files"
          paths:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"

  phase_4:
    name: "e2e_complete_generation"
    agent: "e2e_test_generation"
    description: "Generate and integrate E2E test code using Phase 3 checkpoint analysis results"
    execution_order: 4
    dependencies: ["phase_3"]
    timeout: 150
    parallel_execution: false
    execute_only_if: "e2e_decision.required == YES"
    
    execution_logic:
      steps:
        - step: "check_e2e_required"
          action: "check_yaml_field"
          file: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
          field: "e2e_decision.required"
          expected: "YES"
          skip_phase_if_false: true
        - step: "wait_for_dependencies"
          action: "wait_for_phase"
          wait_for: "phase_2"
          timeout: 10
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/e2e_test_generation.yaml"
        - step: "load_inputs"
          action: "load_phase_outputs"
          inputs:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"
        - step: "execute_subtasks"
          action: "execute_sequential_subtasks"
          subtasks:
            - name: "Git Branch Setup"
              timeout: 40
              tools: ["Git Repository Manager"]
            - name: "E2E Test Case Generation"
              timeout: 120
              tools: ["Pattern Analyzer", "Code Generator", "File Integrator"]
        - step: "save_output"
          action: "save_to_file"
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_test_results.md"

# Execution Strategy for Test Case Generation
execution_strategy:
  parallel:
    enabled: true
    max_concurrent_phases: 4
    dependency_resolution: "optimized"
    parallel_groups:
      group_1: ["phase_1"]  # 35s
      group_2: ["phase_2"]  # 15s (waits for phase_1)
      group_3: ["phase_3"]  # 150s (waits for phase_2)
      group_4: ["phase_4"]  # 150s (waits for phase_3)
    # Phase 4 will auto-skip if e2e_decision.required != "YES"
  
  critical_path:
    enabled: true
    phases: ["phase_1", "phase_2", "phase_3", "phase_4"]
    optimization_priority: "high"

# Performance Configuration (Ultra-Fast)
performance:
  resources:
    memory_limit: "1GB"  # Reduced for speed
    cpu_limit: "8 cores"  # More cores for parallel processing
    priority_allocation: "maximum_speed"
    
  error_handling:
    retry_on_failure: false
    max_retries: 0  # No retries for maximum speed
    fail_fast: true
    timeout_aggressive: true
    
  optimization:
    parallel_file_operations: true
    parallel_agent_execution: true
    cache_component_rules: true
    fast_template_processing: true
    aggressive_caching: true
    skip_validation: true  # Skip non-critical validations
    
  ultra_fast_mode:
    enabled: true
    parallel_phases: ["phase_3", "phase_4"]
    concurrent_file_generation: true
    template_preloading: true
    rule_caching: true
    total_time_budget: 270  # 4.5 minutes hard limit
    phase_time_allocation:
      phase_1: 35  # 35 seconds (target: 30s)
      phase_2: 15  # 15 seconds (target: 10s) - rule matching only
      phase_3_4_parallel: 150  # 2.5 minutes concurrent
    
    performance_targets:
      phase_1_target: 30  # 30 seconds target
      phase_1_warning: 25  # Warning if over 25s
      phase_1_critical: 35  # Critical if over 35s
      phase_2_target: 10   # 10 seconds target - simple rule lookup
      phase_2_warning: 8   # Warning if over 8s
      phase_2_critical: 15  # Critical if over 15s
      phase_3_target: 60   # 60 seconds target - test case generation
      phase_3_warning: 90  # Warning if over 90s
      phase_3_critical: 150  # Critical if over 150s

# Integration Configuration
integration:
  jira:
    enabled: true
    mcp_endpoint: "jira-mcp-snowflake"
    timeout: 30
    
  github:
    enabled: true
    repository_cloning: false  # Not needed for generation
    file_creation: true
    
  deepwiki:
    enabled: true
    mcp_endpoint: "DeepWiki MCP"
    timeout: 20
    cache_enabled: true

# Output Management
output_management:
  base_directory: "workflow_outputs"
  structure:
    pattern: "{COMPONENT}/{JIRA_KEY}/"
    subdirectories:
      - "phases"
      - "test_cases"
  
  validation:
    output_format_validation: true
    content_quality_check: true
    size_limit_enforcement: true