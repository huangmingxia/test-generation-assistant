# Test Case Generation Workflow Configuration
# Dedicated workflow engine for generating test cases only

workflow:
  name: "test_case_generation"
  version: "3.1"
  description: "Optimized parallel workflow for test case generation (Phases 1-4)"
  target_execution_time: "270 seconds"  # 4.5 minutes total for all 4 phases
  total_timeout: 270  # Hard 4.5-minute limit

# Workflow Phases for Test Case Generation
phases:
  phase_1:
    name: "requirements_gathering"
    agent: "requirements_gathering_ultra_fast"
    description: "Ultra-fast requirements gathering from JIRA"
    execution_order: 1
    dependencies: []
    timeout: 60  # 1 minute for JIRA queries and processing
    critical_path: true
    
    execution_logic:
      steps:
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/requirements_gathering.yaml"
        - step: "validate_jira_key"
          action: "validate_jira_key"
          validation: ["jira_key_format", "component_detection", "access_permissions"]
        - step: "execute_agent"
          action: "execute_agent"
          tools: ["jira-mcp-snowflake"]
          output_format: "yaml"
        - step: "save_output"
          action: "save_to_file"
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"

  phase_2:
    name: "test_strategy_analysis"
    agent: "test_strategy_analysis"
    description: "test execution strategy"
    execution_order: 2
    dependencies: ["phase_1"]
    timeout: 60  # 1 minute for strategy analysis
    critical_path: true
    
    execution_logic:
      steps:
        - step: "wait_for_dependencies"
          action: "wait_for_phase"
          wait_for: "phase_1"
          timeout: 10
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/test_strategy_analysis.yaml"
        - step: "load_inputs"
          action: "load_phase_outputs"
          inputs:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
        - step: "execute_agent"
          action: "execute_agent"
          tools: ["component_rules", "test_patterns"]
          output_format: "yaml"
        - step: "save_output"
          action: "save_to_file"
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"

  phase_3:
    name: "test_case_generation"
    agent: "test_case_generation"
    description: "Comprehensive test case generation using checkpoint aggregation"
    execution_order: 3
    dependencies: ["phase_2"]
    timeout: 150  # 2.5 minutes for test case generation (runs in parallel with phase_4)
    parallel_execution: true
    parallel_group: "group_3"
    
    execution_logic:
      steps:
        - step: "wait_for_dependencies"
          action: "wait_for_phase"
          wait_for: "phase_2"
          timeout: 10
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/test_case_generation.yaml"
        - step: "load_inputs"
          action: "load_phase_outputs"
          inputs:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
        - step: "execute_agent"
          action: "execute_agent"
          tools: ["DeepWiki MCP", "Checkpoint Aggregator", "Test Scenario Generator", "Template Processor", "XML Generator", "XML to Markdown Converter"]
          output_format: "mixed"
        - step: "save_outputs"
          action: "save_multiple_files"
          paths:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_polarion.xml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"

  phase_4:
    name: "e2e_complete_generation"
    agent: "e2e_test_generation"
    description: "Generate and integrate E2E test code into openshift-tests-private repository with automated validation"
    execution_order: 3
    dependencies: ["phase_2"]
    timeout: 150  # 2.5 minutes for E2E generation with error fixing (runs in parallel with phase_3)
    parallel_with: ["phase_3"]
    parallel_execution: true
    parallel_group: "group_3"
    
    execution_logic:
      steps:
        - step: "wait_for_dependencies"
          action: "wait_for_phase"
          wait_for: "phase_2"
          timeout: 10
        - step: "load_agent_config"
          action: "load_agent_config"
          config_file: "config/agents/e2e_test_generation.yaml"
        - step: "load_inputs"
          action: "load_phase_outputs"
          inputs:
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
            - "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
        - step: "load_test_cases_optional"
          action: "load_optional_file"
          input: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"
          fallback: "generate_from_requirements"
        - step: "execute_subtasks"
          action: "execute_sequential_subtasks"
          subtasks:
            - name: "Git Branch Setup"
              timeout: 40
              tools: ["Git Repository Manager"]
            - name: "E2E Test Case Generation"
              timeout: 120
              tools: ["Pattern Analyzer", "Code Generator", "File Integrator"]
            - name: "Syntax Validation"
              timeout: 60
              tools: ["Syntax Validator", "Code Fixer", "Make Compiler"]
              error_handling: "auto_fix_and_retry"
          output_format: "markdown"
        - step: "save_output"
          action: "save_to_file"
          path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_test_results.md"

# Execution Strategy for Test Case Generation
execution_strategy:
  parallel:
    enabled: true
    max_concurrent_phases: 4
    dependency_resolution: "optimized"
    parallel_groups:
      group_1: ["phase_1"]  # 60s
      group_2: ["phase_2"]  # 60s (waits for phase_1)
      group_3: ["phase_3", "phase_4"]  # 150s concurrent (waits for phase_2)
    force_parallel_execution: true
    skip_dependency_checks_for_parallel: true
    concurrent_execution_enforced: true
  
  critical_path:
    enabled: true
    phases: ["phase_1", "phase_2", "phase_3", "phase_4"]
    optimization_priority: "high"
    
  parallel_execution_rules:
    phase_3_phase_4_parallel: true
    ignore_sequential_dependencies: true
    concurrent_start: true

# Performance Configuration (Ultra-Fast)
performance:
  resources:
    memory_limit: "1GB"  # Reduced for speed
    cpu_limit: "8 cores"  # More cores for parallel processing
    priority_allocation: "maximum_speed"
    
  error_handling:
    retry_on_failure: false
    max_retries: 0  # No retries for maximum speed
    fail_fast: true
    timeout_aggressive: true
    
  optimization:
    parallel_file_operations: true
    parallel_agent_execution: true
    cache_component_rules: true
    fast_template_processing: true
    aggressive_caching: true
    skip_validation: true  # Skip non-critical validations
    
  ultra_fast_mode:
    enabled: true
    parallel_phases: ["phase_3", "phase_4"]
    concurrent_file_generation: true
    template_preloading: true
    rule_caching: true
    total_time_budget: 270  # 4.5 minutes hard limit
    phase_time_allocation:
      phase_1: 60  # 1 minute
      phase_2: 60  # 1 minute 
      phase_3_4_parallel: 150  # 2.5 minutes concurrent

# Integration Configuration
integration:
  jira:
    enabled: true
    mcp_endpoint: "jira-mcp-snowflake"
    timeout: 30
    
  github:
    enabled: true
    repository_cloning: false  # Not needed for generation
    file_creation: true
    
  deepwiki:
    enabled: true
    mcp_endpoint: "DeepWiki MCP"
    timeout: 20
    cache_enabled: true

# Output Management
output_management:
  base_directory: "workflow_outputs"
  structure:
    pattern: "{COMPONENT}/{JIRA_KEY}/"
    subdirectories:
      - "phases"
      - "test_cases"
  
  validation:
    output_format_validation: true
    content_quality_check: true
    size_limit_enforcement: true