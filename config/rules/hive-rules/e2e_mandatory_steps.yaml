# E2E Test Generation Pattern Analysis Guidelines (Universal)
# This file guides agents to analyze existing test patterns and understand test organization
# Applicable to all components (Hive, CCO, etc.)

scope: "e2e_test_generation"
applicability: "universal"

platform_detection:
  description: "Determine target test file based on test case platform and component"
  mapping:
    # For Hive component
    hive:
      azure: "hive_azure.go"
      aws: "hive_aws.go"  
      gcp: "hive_gcp.go"
      vsphere: "hive_vsphere.go"
      default: "hive.go"
    
    # For CCO component  
    cco:
      default: "cco.go"
    
    # Generic mapping for other components
    default:
      azure: "{component}_azure.go"
      aws: "{component}_aws.go"
      gcp: "{component}_gcp.go"
      default: "{component}.go"
  detection_keywords:
    azure: ["Azure", "azure", "Azure Government", "AzureGov", "usgovtexas", "westus"]
    aws: ["AWS", "aws", "EC2", "us-east-1", "us-west-2"]
    gcp: ["GCP", "gcp", "Google Cloud", "us-central1"]
    vsphere: ["vSphere", "vsphere"]

analysis_guidelines:
  step_1_analyze_existing_tests:
    description: "Analyze existing test cases in the target test file to understand patterns"
    actions:
      - "Use platform_detection mapping to identify the target test file"
      - "Read existing test functions in the identified target file"
      - "Identify common patterns for cluster lifecycle management across platforms"
      - "Understand when and how existing tests wait for cluster/machinepool completion"
      - "Extract timeout patterns and validation approaches"
      - "Note cleanup patterns and resource management"
      
  step_2_understand_test_flow:
    description: "Understand how existing tests organize their execution flow"
    patterns_to_identify:
      - "How do existing tests create ClusterDeployment?"
      - "What wait conditions do they use for cluster provisioning?"
      - "How do they handle MachinePool creation and validation?"
      - "What event checking patterns are used?"
      - "How is scaling tested in existing code?"
      - "What cleanup patterns are followed?"
      
  step_3_extract_common_patterns:
    description: "Extract reusable patterns from existing code"
    focus_areas:
      - "Timeout values used in similar tests"
      - "newCheck() pattern usage for state validation"
      - "defer cleanup patterns"
      - "exutil.By() usage for test step organization"
      - "Error validation approaches"

pattern_learning_approach:
  methodology: "Learn from existing code rather than prescribing specific patterns"
  steps:
    1. "Determine target platform/test file from test case (AWS->hive_aws.go, Azure->hive_azure.go, etc.)"
    2. "Analyze 2-3 existing similar test functions in the identified target file"
    3. "Extract patterns for cluster lifecycle management from existing code"
    4. "Understand timing and wait patterns used in existing tests"
    5. "Apply learned patterns to new test case requirements"
    6. "Adapt patterns based on specific test case needs and platform"
    
  analysis_questions:
    cluster_management:
      - "How do existing tests wait for cluster provisioning to complete?"
      - "What timeout values are commonly used for cluster operations?"
      - "How do existing tests validate cluster installation status?"
      
    machinepool_management:
      - "When do existing tests create MachinePools relative to cluster creation?"
      - "How do they wait for MachinePool readiness?"
      - "What validation steps are used for MachinePool functionality?"
      
    error_handling:
      - "How do existing tests check for specific error conditions?"
      - "What event validation patterns are used?"
      - "How are timeout failures handled?"
      
    test_structure:
      - "How are test steps organized with exutil.By()?"
      - "Where are cleanup operations placed in existing tests?"
      - "How are scaling operations tested in existing code?"

learning_outputs:
  patterns_to_extract:
    - "Common newCheck() usage patterns and their parameters"
    - "Typical timeout values for different operations"
    - "Standard cleanup patterns with defer statements"
    - "Event checking and validation approaches"
    - "Test step organization and flow"
    
  apply_to_new_test:
    description: "Use learned patterns to structure the new test case"
    approach:
      - "Follow the same test flow structure as existing similar tests"
      - "Use similar timeout values for similar operations"
      - "Apply the same validation patterns for status checking"
      - "Implement cleanup following existing patterns"
      - "Structure test steps consistently with existing code"