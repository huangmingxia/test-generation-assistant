test_type_selection_criteria:
  e2e_decision_rule:
    description: "Determines whether E2E testing should be applied for a given platform."
    default: "E2E testing"
    exclusions:
      - "OpenStack"
      - "IBM Cloud"
      - "Nutanix"
    fallback: "manual testing only"
    notes: "E2E testing is used for all other platforms unless explicitly excluded."
