# Universal E2E Pattern Learning
scope: "universal_e2e_test_generation"
applicability: "all_components"

# Platform Detection
platform_detection:
  platform_keywords:
    azure: ["Azure", "azure", "AzureGov", "usgovtexas"]
    aws: ["AWS", "aws", "us-east-1", "us-west-2"]
    gcp: ["GCP", "gcp", "us-central1"]
    vsphere: ["vSphere", "vsphere"]
    
  target_file_mapping:
    hive:
      azure: "hive_azure.go"
      aws: "hive_aws.go"
      gcp: "hive_gcp.go"
      vsphere: "hive_vsphere.go"
      default: "hive.go"
    cco:
      azure: "cco_azure.go"
      aws: "cco_aws.go"
      gcp: "cco_gcp.go"
      default: "cco.go"
    default:
      azure: "{component}_azure.go"
      aws: "{component}_aws.go"
      gcp: "{component}_gcp.go"
      default: "{component}.go"

# Pattern Learning
pattern_learning:
  steps:
    1. "Parse JIRA key to determine component"
    2. "Extract platform from test case keywords"
    3. "Locate target test file using mapping"
    4. "Analyze 2-3 existing similar tests"
    5. "Extract patterns and apply to new test"
    
  focus_areas:
    - "Test structure and organization"
    - "Variable naming and conventions"
    - "Timeout and wait patterns"
    - "Cleanup and error handling"

# Generation Rules
generation_rules:
  - "Follow existing test patterns exactly"
  - "Use specific platform values, not generic variables"
  - "Match existing code style and formatting"
  - "Include proper cleanup with defer"
  - "Use established timeout values"
  - "Apply consistent validation patterns"