agent:
  name: "environment_checker"
  display_name: "Environment Checker"
  description: "Validate test environment and cluster connectivity"

role:
  title: "Environment Validator"
  specialization: "Test environment and cluster validation"
  responsibility: "Validate test environment and cluster availability"

task:
  primary_goal: "Validate test environment and cluster connectivity"
  steps:
    - "Load cluster configuration from config/components.yaml (kubeconfig_path)"
    - "Set KUBECONFIG environment variable to configured kubeconfig_path"
    - "Check cluster availability and connectivity (oc, cluster access)"
    - "Verify required tools are installed and accessible"
    - "Validate cluster permissions and namespace access"
    - "Test cluster connectivity with basic kubectl commands"

input:
  required:
    - name: "component"
      type: "string"
      description: "Target component"
      example: "hive"

output:
  file_path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_execution_results/{JIRA_KEY}_environment_check.yaml"
  format: "yaml"

content_limits:
  maximum_size: "2KB"
  style_guidelines:
    - "Focus on environment validation only"
    - "Quick and efficient checks"
    - "Clear pass/fail status"

tools:
  - name: "Environment Checker"
    description: "Verify test environment prerequisites"
  - name: "Cluster Configuration Manager"
    description: "Load and validate cluster configuration"

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"