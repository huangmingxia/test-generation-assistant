agent:
  name: "e2e_test_generation"
  display_name: "E2E Test Generator"
  description: "Generate and integrate E2E tests into openshift-tests-private for {jira_issue_key}"

role:
  title: "E2E Test Generator"
  specialization: "E2E test generation for openshift-tests-private"
  responsibility: "Generate compat-based tests inside openshift-tests-private repo"

task:
  primary_goal: "Generate E2E test case in openshift-tests-private and validate integration"
  execution_strategy: "direct_git_and_code_generation"
  execution_method: "no_task_tool_required"
  execution_mode: "sequential_subtasks"

  subtasks:
    - name: "Git Branch Setup"
      timeout: "40s"
      input_requirements: ["jira_issue_key", "component"]
      steps:
        - "Load component configuration from config/rules/{COMPONENT}-rules/component_rules_config.yaml"
        - "Determine E2E repository type from e2e_type (test_private or component_repo)"
        - "Resolve repository location: {e2e_repositories[e2e_type].location}"
        - "Check if local repository exists at resolved location"
        - "If not: git clone {e2e_repositories[e2e_type].url} {e2e_repositories[e2e_type].location}"
        - "cd into resolved repository location"
        - "Check git status and branch"
        - "Switch to master branch: git checkout master"
        - "Check if upstream remote exists: git remote -v"
        - "If upstream not exists: git remote add upstream https://github.com/openshift/openshift-tests-private.git"
        - "Fetch latest from upstream: git fetch upstream"
        - "Update master from upstream: git merge upstream/master"
        - "Push updated master to origin: git push origin master"
        - "Create or checkout branch: ai-case-design-{JIRA_KEY} from updated master branch"
        - "Ensure working directory is clean and ready"
      success_criteria:
        - "Correct repository loaded from config"
        - "Branch ai-case-design-{JIRA_KEY} ready for development"
        - "Repository is in clean state"

    - name: "E2E Test Case Generation"
      timeout: "120s"
      input_requirements: ["requirements_input", "test_strategy_input", "test_case_input", "component"]
      steps:
        - "Load component configuration from config/rules/{COMPONENT}-rules/component_rules_config.yaml"
        - "Load agent rules from component_rules_config.yaml → agent_rules.e2e_test_generation"
        - "Analyze existing test cases in target repository to learn current testing framework and patterns"
        - "Read Phase 3 checkpoint analysis results from test_case_input to understand optimized test scenarios and checkpoint dependencies"
        - "Extract consolidated test scenarios and checkpoint execution sequence from Phase 3 output"
        - "Combine learned patterns, rules, Phase 3 checkpoint analysis, and test requirements to generate test logic and structure"
        - "Generate E2E test code that follows the optimized checkpoint sequence from Phase 3 analysis"
        - "Write the appropriate test file in the repo following the consolidated scenario approach"
        - "Add AI authorship information in test file header comments: '// Auto-generated by AI Test Generation Assistant' and '// JIRA: {JIRA_KEY}'"
      success_criteria:
        - "Go test file updated in test repo following compat patterns"
        - "Test logic matches rules and requirements"

    - name: "Syntax Validation"
      timeout: "60s"
      input_requirements: ["component"]
      steps:
        - "Load component configuration from config/rules/{COMPONENT}-rules/component_rules_config.yaml"
        - "If e2e_type == 'test_private':"
        - "  Run 'make all' to validate compilation and formatting in private repo"
        - "If e2e_type == 'component_repo':"
        - "  Run 'make verify' to validate compilation, formatting, and tests in component repo"
        - "Check output for errors (syntax, imports, formatting)"
        - "If errors detected:"
        - "  Attempt to automatically fix common issues (missing imports, formatting via go fmt, minor syntax corrections)"
        - "  Re-run the appropriate validation command for the repo type"
        - "  If still failing, log errors and stop for manual intervention"
      success_criteria:
        - "Compilation and verification OK after fixes, or errors documented for manual review"

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "component"
      type: "string"
      description: "Component name"
      example: "hive"
    - name: "requirements_input"
      type: "file"
      description: "Test requirements"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
    - name: "test_strategy_input"
      type: "file"
      description: "Test strategy and E2E decision"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_test_strategy_output.yaml"
    - name: "test_case_input"
      type: "file"
      description: "Phase 3 checkpoint analysis and optimized test scenarios"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"

output:
  files:
    - name: "{JIRA_KEY}_e2e_test_results.md"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_test_results.md"
      format: "markdown"
      description: "E2E test generation results and repository integration status"
      template: "config/templates/e2e_test_results_template.md"

tools:
  - name: "Git operations"
    description: "Repository cloning, branching, and management"
    operations: ["git clone", "git checkout", "git merge", "git push"]
  - name: "File operations"
    description: "Read inputs, write E2E test files, and result documentation"
    operations: ["Read", "Write", "Glob", "Edit"]
  - name: "Build validation"
    description: "Run make commands for syntax validation"
    operations: ["make all", "make verify"]
  requires_mcp_tools: []

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"
  repository_management: true
  validation_required: true
  template_replacement: true
