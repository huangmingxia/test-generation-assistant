agent:
  name: "e2e_test_runner"
  display_name: "E2E Test Runner"
  description: "Execute E2E tests and capture results"

role:
  title: "E2E Test Executor"
  specialization: "E2E test execution and monitoring"
  responsibility: "Execute E2E tests and capture comprehensive results"

task:
  primary_goal: "Execute E2E tests and capture execution results"
  steps:
    - "Read E2E test results from workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_test_results.md"
    - "Navigate to E2E test repository location"
    - "Execute E2E test commands with proper timeout and filtering"
    - "Monitor E2E test execution and capture results"
    - "Capture E2E test output and error messages"
    - "Record E2E test execution time and resource usage"

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "component"
      type: "string"
      description: "Target component"
      example: "hive"
    - name: "e2e_test_results_input"
      type: "file"
      description: "E2E test generation results"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_test_results.md"

output:
  file_path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/test_execution_results/{JIRA_KEY}_e2e_execution_results.yaml"
  format: "yaml"

content_limits:
  maximum_size: "10KB"
  style_guidelines:
    - "Focus on test execution only"
    - "Capture all test output and error messages"
    - "Provide clear pass/fail status for each test scenario"
    - "Include execution time and resource usage information"

tools:
  - name: "E2E Test Runner"
    description: "Execute E2E test suite against available cluster"
  - name: "Log Capture Tool"
    description: "Capture and format test execution logs"

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"
  execution_timeout: 3600  # 60 minutes for E2E test execution