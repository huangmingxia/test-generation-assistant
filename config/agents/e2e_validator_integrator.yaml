agent:
  name: "e2e_validator_integrator"
  display_name: "E2E Validator & Integrator"
  description: "Validate and integrate E2E test code into repository"

role:
  title: "E2E Validator & Integrator"
  specialization: "Code validation and repository integration"
  responsibility: "Validate generated E2E code and integrate into repository"

task:
  primary_goal: "Validate and integrate E2E test code into repository"
  execution_mode: "efficient"
  subtasks:
    - name: "Branch Creation & Setup"
      timeout: "20s"
      input_requirements: ["jira_issue_key", "component"]
      steps:
        - "Check current branch status in the repository"
        - "Create new branch named 'ai-assist-e2e-{JIRA_KEY}'"
        - "Switch to target branch and verify clean working directory"
        - "Ensure working directory is clean and ready for code integration"
    
    - name: "Code Integration & Validation"
      timeout: "40s"
      dependencies: ["Branch Creation & Setup"]
      input_requirements: ["jira_issue_key", "component", "e2e_code_input"]
      steps:
        - "Load generated E2E code from e2e_code_input"
        - "Locate target E2E test file using platform detection"
        - "Add new test case to appropriate location in target file"
        - "MANDATORY: Execute 'make all' to validate test code syntax"
        - "MANDATORY: Check for compilation errors and fix immediately if found"
        - "MANDATORY: Re-run 'make all' after fixes to ensure clean compilation"
        - "Commit changes with proper commit message"
        - "Prepare branch for review"

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "component"
      type: "string"
      description: "Target component"
      example: "hive"
    - name: "e2e_code_input"
      type: "file"
      description: "Generated E2E code (required for Code Integration & Validation)"
      path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_code_generated.md"
      required: false

output:
  file_path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_e2e_integration_results.md"
  format: "markdown"

content_limits:
  maximum_size: "5KB"
  style_guidelines:
    - "Focus on git operations and validation"
    - "ALWAYS execute 'make all' after code integration"
    - "NEVER skip validation steps"
    - "Ensure clean compilation before completing"
    - "Use proper git operations (branch creation only, no auto-commit)"
    - "Branch Creation & Setup: Focus on git branch operations"
    - "Code Integration & Validation: Focus on code integration and validation"
    - "Execute subtasks based on input requirements"

tools:
  - name: "Git Repository Manager"
    description: "Manage git operations"
  - name: "Code Validator"
    description: "Validate test code syntax"
  - name: "Error Checker and Fixer"
    description: "Check and fix compilation errors"

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"
  template_replacement: true