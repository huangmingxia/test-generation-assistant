agent:
  name: "requirements_gathering"
  display_name: "Requirements Gathering Agent"
  description: "Senior QE Requirements Analyst for {jira_issue_key} test requirement extraction"

role:
  title: "Senior QE Requirements Analyst"
  specialization: "{jira_issue_key} test requirement extraction"
  responsibility: "Extract test checkpoints and requirements from JIRA issues for {jira_issue_key}"

task:
  primary_goal: "Extract essential test data from JIRA {jira_issue_key} in under 30 seconds"
  execution_strategy: "direct_mcp_and_template"
  execution_method: "no_task_tool_required"
  steps:
    - "Use jira-mcp-snowflake MCP to query JIRA (15s max)"
    - "Fill inline_template variables directly (10s max)" 
    - "Write YAML file to specified path (5s max)"
  optimization_mode: "ultra_fast"
  skip_validation: true
  requires_mcp_tools: ["jira-mcp-snowflake"]

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "component"
      type: "string"
      description: "Target component (e.g., hive, cco, other)"
      example: "hive"

content_limits:
  maximum_size: "1KB"
  style_guidelines:
    - "ULTRA-FAST mode: Template filling only"
    - "Essential data extraction only"
    - "Maximum 6 test checkpoints"
    - "Maximum 3 platforms"
    - "No analysis, just facts"
    - "Skip optional fields if data not immediately available"

tools:
  - name: "jira-mcp-snowflake MCP"
    description: "Single fast JIRA query - essential fields only"
    timeout: 15
    query_optimization: true
    fields_limit: ["summary", "description", "component", "priority", "status"]

output:
  format: "yaml"
  file_path: "workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
  inline_template: |
    jira_issue:
      key: "{JIRA_KEY}"
      summary: "{ISSUE_SUMMARY}"

    test_checkpoints:
      - "{CHECKPOINT_1}"
      - "{CHECKPOINT_2}"
      - "{CHECKPOINT_3}"

    target_platforms:
      - "{PLATFORM_1}"

    test_scope:
      in_scope: ["{IN_SCOPE_1}", "{IN_SCOPE_2}"]
      out_of_scope: ["{OUT_OF_SCOPE_1}"]

configuration:
  optimization_mode: "ultra_fast"
  skip_validation: true
