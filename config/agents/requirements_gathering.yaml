agent:
  name: "requirements_gathering"
  display_name: "Requirements Gathering Agent"
  description: "Senior QE Requirements Analyst for {jira_issue_key} test requirement extraction"

role:
  title: "Senior QE Requirements Analyst"
  specialization: "{jira_issue_key} test requirement extraction"
  responsibility: "Extract test checkpoints and requirements from JIRA issues for {jira_issue_key}"

task:
  primary_goal: "Extract test checkpoints and requirements from JIRA issues for {jira_issue_key}"
  steps:
    - "Load component-specific agent rules from config/rules/{COMPONENT}-rules/component_rules_config.yaml, agent_rules.requirements_gathering"
    - "Fetch JIRA issue details using jira-mcp-snowflake MCP"
    - "STRICTLY follow output template structure from config/templates/test_requirements_template.yaml"
    - "Save to workflow_outputs/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "component"
      type: "string"
      description: "Target component (e.g., hive, cco, other)"
      example: "hive"

content_limits:
  maximum_size: "1.5KB"
  style_guidelines:
    - "STRICTLY follow template structure exactly - no deviations allowed"
    - "Use bullet points"
    - "Focus on test checkpoints"
    - "No detailed analysis"
    - "Fast mode"
    - "Template structure is mandatory"

tools:
  - name: "jira-mcp-snowflake MCP"
    description: "Fetch JIRA issue details and extract requirements"

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"
  template_replacement: true
  template_enforcement: "strict"
  
